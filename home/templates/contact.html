{% extends "base.html" %}
{% block title %}Contact{% endblock title %}

{% block body %}
<section class="contact-section py-5">
  <div class="container">
    <div class="row">
      <!-- Contact Form -->
      <div class="col-md-8">
        <div class="contact-form-box p-4 shadow rounded">
          <h2 class="mb-4 text-center">Get in Touch</h2>

          <!-- Messages -->
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}

          <form action="{% url 'contact' %}" method="post">
            {% csrf_token %}

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input
                  type="text"
                  name="name"
                  class="form-control"
                  placeholder="Enter your name"
                  required
                >
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Enter your email"
                  required
                >
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input
                  type="text"
                  name="phone"
                  class="form-control"
                  placeholder="Enter your phone number"
                  required
                >
              </div>

              <div class="col-md-6">
                <label class="form-label">Subject</label>
                <input
                  type="text"
                  name="subject"
                  class="form-control"
                  placeholder="Enter subject"
                  required
                >
              </div>

              <div class="col-12">
                <label class="form-label">Message</label>
                <textarea
                  name="message"
                  class="form-control"
                  rows="5"
                  placeholder="Write your message here..."
                  required
                ></textarea>
              </div>

              <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary px-4">
                  Send Now
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Map -->
      <div class="col-md-4 mt-4 mt-md-0">
        <div class="map-box shadow rounded overflow-hidden">
          <iframe
            width="100%"
            height="350"
            style="border:0;"
            loading="lazy"
            allowfullscreen
            src="https://www.google.com/maps?q=MC%20Complex%20shop%20No.101%20Near%20Adidas%20Showroom%20MC%20complex%20Shree%20Viraj%20Dental%20Clinic%20Gautam%20Buddha%20Nagar%20Uttar%20Pradesh%20India&output=embed">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
.contact-section {
  background: #f9f9f9;
}

.contact-form-box {
  background: #fff;
}

.contact-form-box h2 {
  font-weight: 700;
  color: #071c34;
}

.form-control {
  border-radius: 6px;
  padding: 12px;
}

.btn-primary {
  background: #fda40b;
  border: none;
  border-radius: 6px;
  font-weight: 600;
}

.btn-primary:hover {
  background: #071c34;
}

.map-box {
  min-height: 350px;
}
</style>
{% endblock body %}
