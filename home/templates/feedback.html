{% extends "base.html" %}
{% block title %}Feedback{% endblock title %}

{% block body %}
<section class="contact-section py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="contact-form-box p-4 shadow rounded">
          <h2 class="mb-4 text-center">Give Your Feedback</h2>

          <form action="{% url 'feedback' %}" method="post">
            {% csrf_token %}

            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            {% endif %}

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input
                  type="text"
                  name="name"
                  class="form-control"
                  placeholder="Enter your name"
                  required
                >
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Enter your email"
                  required
                >
              </div>

              <div class="col-12">
                <label class="form-label">Feedback</label>
                
              </div>

              <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary px-4">
                  Submit Feedback
                </button>
              </div>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</section>

<style>
  .contact-section {
    background: #f9f9f9;
  }

  .contact-form-box {
    background: #fff;
  }

  .contact-form-box h2 {
    font-weight: 700;
    color: #071c34;
  }

  .form-control {
    border-radius: 6px;
    padding: 12px;
  }

  .btn-primary {
    background: #fda40b;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    transition: 0.3s;
  }

  .btn-primary:hover {
    background: #071c34;
  }
</style>
{% endblock body %}
